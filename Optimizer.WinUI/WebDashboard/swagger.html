<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimizer API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; background: #1a1a2e; }
        #swagger-ui { max-width: 1200px; margin: 0 auto; }
        .swagger-ui .topbar { background-color: #16213e; }
        .swagger-ui .topbar .download-url-wrapper .select-label select { border-color: #0f3460; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                url: '/openapi/v1.json',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.SwaggerUIStandalonePreset
                ],
                layout: 'BaseLayout',
                tryItOutEnabled: true,
                requestInterceptor: (request) => {
                    // Reads the token stored by the web dashboard on successful connect
                    const token = localStorage.getItem('optimizer-api-token');
                    if (token) {
                        request.headers['Authorization'] = `Bearer ${token}`;
                    }
                    return request;
                }
            });
        };
    </script>
</body>
</html>
