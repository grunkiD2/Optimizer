name: Build

on:
  push:
    branches: [main, master, "feature/**", "redesign/**"]
  pull_request:
    branches: [main, master, "feature/**"]

jobs:
  # Core .NET projects: WinUI, Cli, Server + their tests. Fast — no MAUI workload.
  build:
    name: Build & test (.NET, no MAUI)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x
        include-prerelease: true

    - name: Restore
      run: |
        dotnet restore Optimizer.WinUI/Optimizer.WinUI.csproj
        dotnet restore Optimizer.WinUI.Tests/Optimizer.WinUI.Tests.csproj
        dotnet restore Optimizer.Cli/Optimizer.Cli.csproj
        dotnet restore Optimizer.Cli.Tests/Optimizer.Cli.Tests.csproj
        dotnet restore Optimizer.Server/Optimizer.Server.csproj
        dotnet restore Optimizer.Server.Tests/Optimizer.Server.Tests.csproj

    - name: Build WinUI
      run: dotnet build Optimizer.WinUI/Optimizer.WinUI.csproj -c Release --no-restore

    - name: Build WinUI tests
      run: dotnet build Optimizer.WinUI.Tests/Optimizer.WinUI.Tests.csproj -c Release --no-restore

    - name: Build Cli
      run: dotnet build Optimizer.Cli/Optimizer.Cli.csproj -c Release --no-restore

    - name: Build Cli tests
      run: dotnet build Optimizer.Cli.Tests/Optimizer.Cli.Tests.csproj -c Release --no-restore

    - name: Build Server
      run: dotnet build Optimizer.Server/Optimizer.Server.csproj -c Release --no-restore

    - name: Build Server tests
      run: dotnet build Optimizer.Server.Tests/Optimizer.Server.Tests.csproj -c Release --no-restore

    - name: Test WinUI
      run: dotnet test Optimizer.WinUI.Tests/Optimizer.WinUI.Tests.csproj --no-build -c Release --logger "trx;LogFileName=winui.trx"

    - name: Test Cli
      run: dotnet test Optimizer.Cli.Tests/Optimizer.Cli.Tests.csproj --no-build -c Release --logger "trx;LogFileName=cli.trx"

    - name: Test Server
      run: dotnet test Optimizer.Server.Tests/Optimizer.Server.Tests.csproj --no-build -c Release --logger "trx;LogFileName=server.trx"

    - name: Publish WinUI
      run: dotnet publish Optimizer.WinUI/Optimizer.WinUI.csproj -c Release -r win-x64 --self-contained false -o publish

    # Launch the published exe, hit /api/health, ensure no crash.log was written.
    # This is the closest thing to "did the app actually start" we can run headless.
    # CAVEAT: WinUI 3 may fail to create a window on a CI runner without an interactive
    # desktop session; if so, the DEBUG REST API on :8765 still binds, but window
    # creation may bypass that. `continue-on-error: true` keeps it informational
    # until we confirm it works on windows-latest.
    - name: Smoke — launch + health check
      continue-on-error: true
      shell: pwsh
      run: |
        # Pre-seed onboarding skip + DEBUG build feature flags.
        $appSettingsDir = "$env:LOCALAPPDATA\Optimizer"
        New-Item -ItemType Directory -Force $appSettingsDir | Out-Null
        @{
          HasCompletedOnboarding = $true
          LastNavigationItem     = "CommandCenter"
        } | ConvertTo-Json | Set-Content "$appSettingsDir\app-settings.json"

        # Wipe any prior crash so we only inspect this run.
        Remove-Item -ErrorAction SilentlyContinue "$appSettingsDir\crash.log"

        $exe = "publish/Optimizer.WinUI.exe"
        if (-not (Test-Path $exe)) { throw "publish artifact missing: $exe" }

        $proc = Start-Process $exe -PassThru
        try {
            # Give the app up to ~15s to bind the REST API.
            $deadline = (Get-Date).AddSeconds(15)
            $ok = $false
            while ((Get-Date) -lt $deadline) {
                try {
                    $r = Invoke-WebRequest "http://127.0.0.1:8765/api/health" -UseBasicParsing -TimeoutSec 2
                    if ($r.StatusCode -eq 200) { $ok = $true; break }
                } catch { Start-Sleep -Milliseconds 500 }
            }
            if (-not $ok) { throw "REST API /api/health did not respond 200 within 15s." }
            Write-Host "Health check OK."
        } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
        }

        $crashLog = "$appSettingsDir\crash.log"
        if (Test-Path $crashLog) {
            Write-Host "::error::crash.log was written during smoke launch:"
            Get-Content $crashLog -Tail 60 | Write-Host
            throw "App crashed during smoke."
        }
        Write-Host "Smoke pass — no crash, API alive."

    - name: Upload WinUI artifact
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: Optimizer-WinUI
        path: publish/
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
        retention-days: 7

  # Separate job for Optimizer.Mobile (MAUI). Pulls the workload (~1.5 GB),
  # builds Android only — iOS would require a macOS runner. Continues on error
  # so a MAUI workload regression doesn't block desktop releases.
  mobile:
    name: Build Mobile (MAUI Android)
    runs-on: windows-latest
    continue-on-error: true

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          10.0.x
        include-prerelease: true

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Restore Mobile
      run: dotnet restore Optimizer.Mobile/Optimizer.Mobile.csproj

    - name: Build Mobile (Android)
      run: dotnet build Optimizer.Mobile/Optimizer.Mobile.csproj -c Release -f net10.0-android --no-restore
